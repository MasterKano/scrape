name: Update market data

on:
  workflow_dispatch:
    inputs:
      end_date:
        description: "End date YYYY-MM-DD. Leave blank to use today."
        required: false
        default: ""
      max_workers:
        description: "Max workers"
        required: false
        default: "1"

permissions:
  contents: write

concurrency:
  group: market-data-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run scraper
        id: run_scraper
        shell: bash
        run: |
          set +e

          END_DATE="${{ github.event.inputs.end_date }}"
          if [ -z "$END_DATE" ]; then
            END_DATE="$(date -u +%F)"
          fi

          echo "Using end date: $END_DATE"

          python eex_scraper.py \
            --mode auto-update \
            --master-file master/eex_master.csv \
            --output-dir Output \
            --end-date "$END_DATE" \
            --max-workers "${{ github.event.inputs.max_workers }}" \
            --request-gap-seconds 1.0 \
            --max-request-gap-seconds 3.0

          SCRAPER_EXIT_CODE=$?
          echo "scraper_exit_code=$SCRAPER_EXIT_CODE" >> "$GITHUB_OUTPUT"

          exit 0

      - name: Upload run outputs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: market-data-run-output
          path: |
            Output/*.csv
            Output/*.json
            Output/*.log
          if-no-files-found: warn
          retention-days: 30

      - name: Commit master update
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add master/eex_master.csv

          if git diff --cached --quiet; then
            echo "No master CSV changes to commit."
          else
            git commit -m "Update market data master"
            git push
          fi

      - name: Fail if scraper reported errors
        if: steps.run_scraper.outputs.scraper_exit_code != '0'
        run: |
          echo "Scraper completed with failures. Check uploaded artifacts."
          exit 1
